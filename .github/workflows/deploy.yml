name: Deploy

# NOTE: this deploys apps/api, apps/collectors, and apps/alerts as-is from
# their own directories. Because @f1-job-radar/schema, @f1-job-radar/db, and
# @f1-job-radar/email are npm workspace-local packages (resolved via
# root-level node_modules symlinks, not published to any registry), Azure's
# remote (Oryx) build cannot resolve them if it only sees one app directory in
# isolation. Before this workflow can deploy successfully, pick one:
#   (a) bundle each Function App with esbuild into a single dist file that
#       inlines the workspace packages, or
#   (b) publish the @f1-job-radar/* packages to a registry (e.g. GitHub
#       Packages) and depend on a real version range instead of the `*`
#       workspace protocol.
# Tracked as a Phase 0 -> Phase 1 follow-up; left unresolved here since it
# can't be verified without real Azure credentials.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api
      - uses: actions/upload-artifact@v4
        with:
          name: collectors-dist
          path: apps/collectors
      - uses: actions/upload-artifact@v4
        with:
          name: alerts-dist
          path: apps/alerts
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: apps/api
      - uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_API_FUNCTIONAPP_NAME }}
          package: apps/api
          publish-profile: ${{ secrets.AZURE_API_FUNCTIONAPP_PUBLISH_PROFILE }}

  deploy-collectors:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: collectors-dist
          path: apps/collectors
      - uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_COLLECTORS_FUNCTIONAPP_NAME }}
          package: apps/collectors
          publish-profile: ${{ secrets.AZURE_COLLECTORS_FUNCTIONAPP_PUBLISH_PROFILE }}

  deploy-alerts:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: alerts-dist
          path: apps/alerts
      - uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_ALERTS_FUNCTIONAPP_NAME }}
          package: apps/alerts
          publish-profile: ${{ secrets.AZURE_ALERTS_FUNCTIONAPP_PUBLISH_PROFILE }}

  deploy-web:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/dist
          skip_app_build: true
